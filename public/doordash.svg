<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none" role="img" aria-label="DoorDash">
  <title>DoorDash</title>
  <rect width="200" height="56" rx="12" fill="#FF3008"/>
  <!-- Door / D icon -->
  <path d="M14 12 H22 Q36 12 36 28 Q36 44 22 44 H14 Z"
        stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner opening (hollow D) -->
  <path d="M19 19 H22 Q29 19 29 28 Q29 37 22 37 H19 Z"
        fill="#FF3008"/>
  <!-- Doorknob -->
  <circle cx="31" cy="28" r="2.5" fill="white"/>
  <!-- Wordmark -->
  <text x="50" y="36"
        font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="800"
        font-size="20"
        fill="white"
        letter-spacing="-0.5">DoorDash</text>
</svg>
